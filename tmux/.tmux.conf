# ============================================================================
# BASIC SETTINGS
# ============================================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix
unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 10

# ============================================================================
# COLORS & TERMINAL
# ============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ============================================================================
# VIM INTEGRATION
# ============================================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Smart pane switching
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ============================================================================
# WINDOW & PANE MANAGEMENT
# ============================================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ============================================================================
# ADM THEME
# ============================================================================
# Old palette:
# bg        = #111111
# fg        = #a0a0a0
# accent    = #9c8d7e
# border    = #3a3f58
# msg-bg    = #2a2e3f

set -g status-position top
set -g status-justify "left"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#232e3b"
set -g pane-active-border-style "fg=#987afb"

# Status bar base
set -g status-style "bg=#0D1116,fg=#b7bfce"

# Messages
set -g message-style "fg=#987afb,bg=#141b22,align=centre"
set -g message-command-style "fg=#987afb,bg=#141b22,align=centre"

# Window status
set -g window-status-activity-style "fg=#f1fc79,bg=#0D1116,none"
set -g window-status-separator ""
set -g window-status-style "fg=#b7bfce,bg=#0D1116,none"

# Active window: index + star + name in purple
set -g window-status-current-format "#[fg=#b7bfce,bg=#0D1116] #I*: #[fg=#987afb,bg=#0D1116,bold]#W "

# Inactive windows: index + name
set -g window-status-format "#[fg=#232e3b,bg=#0D1116] #I: #[fg=#232e3b,bg=#0D1116]#W "

# Left: session name
set -g status-left "#[fg=#b7bfce,bg=#0D1116] [#S] "

# Right: [PREFIX] purple when active | current program
set -g status-right "#{?client_prefix,#[fg=#987afb],#[fg=#b7bfce]}[PREFIX] #[fg=#232e3b]| #[fg=#b7bfce]#{pane_current_command} "

# Copy mode / clock
set -g mode-style "fg=#0D1116 bg=#987afb bold"
set -g clock-mode-colour "#987afb"

# ============================================================================
# POPUPS & HELP
# ============================================================================
bind ? display-popup -E -w 60% -h 30% "printf '\033[1;38;2;152;122;251mQUICK REFERENCE\033[0m
\033[1;38;2;241;252;121mPREFIX: Ctrl-a\033[0m
\033[1;38;2;4;209;249mPANES\033[0m               \033[1;38;2;4;209;249mWINDOWS\033[0m           \033[1;38;2;4;209;249mSESSIONS\033[0m
\033[0;38;2;152;122;251m─────\033[0m               \033[0;38;2;152;122;251m───────\033[0m           \033[0;38;2;152;122;251m────────\033[0m
\033[0;38;2;55;244;153m|\033[0m split vert       \033[0;38;2;55;244;153mc\033[0m new             \033[0;38;2;55;244;153ms\033[0m list
\033[0;38;2;55;244;153m-\033[0m split horiz      \033[0;38;2;55;244;153mn\033[0m next            \033[0;38;2;55;244;153md\033[0m detach
\033[0;38;2;55;244;153mhjkl\033[0m navigate      \033[0;38;2;55;244;153mp\033[0m prev            \033[0;38;2;55;244;153m\$\033[0m rename
\033[0;38;2;55;244;153mHJKL\033[0m resize        \033[0;38;2;55;244;153m,\033[0m rename
\033[0;38;2;55;244;153mm\033[0m maximize         \033[0;38;2;55;244;153m&\033[0m kill
\033[0;38;2;55;244;153mx\033[0m kill
\033[0;38;2;241;252;121m?\033[0m help  \033[0;38;2;241;252;121mr\033[0m reload  \033[0;38;2;241;252;121m:\033[0m command mode
\033[2mPress any key (q/Esc) to close\033[0m
'; zsh -c 'read -k 1'"

# ============================================================================
# PLUGINS
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
