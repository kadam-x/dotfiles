# ============================================================================
# BASIC SETTINGS
# ============================================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix
unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 10

# ============================================================================
# COLORS & TERMINAL
# ============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ============================================================================
# VIM INTEGRATION
# ============================================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Smart pane switching
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ============================================================================
# WINDOW & PANE MANAGEMENT
# ============================================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ============================================================================
# BEIGE THEME
# ============================================================================
set -g status-position top
set -g status-justify "left"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#3a3f58"
set -g pane-active-border-style "fg=#9c8d7e"

# Status bar base
set -g status-style "bg=#111111,fg=#a0a0a0"

# Messages
set -g message-style "fg=#9c8d7e,bg=#2a2e3f,align=centre"
set -g message-command-style "fg=#9c8d7e,bg=#2a2e3f,align=centre"

# Window status
set -g window-status-activity-style "fg=#f1fa8c,bg=#111111,none"
set -g window-status-separator ""
set -g window-status-style "fg=#a0a0a0,bg=#111111,none"

# Active window: index + star + name in beige
set -g window-status-current-format "#[fg=#a0a0a0,bg=#111111] #I*: #[fg=#9c8d7e,bg=#111111,bold]#W "

# Inactive windows: index + name
set -g window-status-format "#[fg=#a0a0a0,bg=#111111] #I: #[fg=#a0a0a0,bg=#111111]#W "

# Left side: session name in brackets
set -g status-left "#[fg=#a0a0a0,bg=#111111] [#S] "

# Right: [PREFIX] beige when active, same grey as program name by default | current program
set -g status-right "#{?client_prefix,#[fg=#9c8d7e],#[fg=#a0a0a0]}[PREFIX] #[fg=#3a3f58]| #[fg=#a0a0a0]#{pane_current_command} "

# Copy mode / clock
set -g mode-style "fg=#9c8d7e bg=#2a2e3f bold"
set -g clock-mode-colour "#9c8d7e"

# ============================================================================
# POPUPS & HELP (ZSH Optimized)
# ============================================================================
bind ? display-popup -E -w 60% -h 30% "printf '\033[1;38;2;156;141;126mQUICK REFERENCE\033[0m
\033[1;33mPREFIX: Ctrl-a\033[0m
\033[1;36mPANES\033[0m               \033[1;36mWINDOWS\033[0m           \033[1;36mSESSIONS\033[0m
\033[0;38;2;156;141;126m─────\033[0m               \033[0;38;2;156;141;126m───────\033[0m           \033[0;38;2;156;141;126m────────\033[0m
\033[0;32m|\033[0m split vert       \033[0;32mc\033[0m new             \033[0;32ms\033[0m list
\033[0;32m-\033[0m split horiz      \033[0;32mn\033[0m next            \033[0;32md\033[0m detach
\033[0;32mhjkl\033[0m navigate      \033[0;32mp\033[0m prev            \033[0;32m\$\033[0m rename
\033[0;32mHJKL\033[0m resize        \033[0;32m,\033[0m rename
\033[0;32mm\033[0m maximize         \033[0;32m&\033[0m kill
\033[0;32mx\033[0m kill
\033[0;33m?\033[0m help  \033[0;33mr\033[0m reload  \033[0;33m:\033[0m command mode
\033[2mPress any key (q/Esc) to close\033[0m
'; zsh -c 'read -k 1'"

# ============================================================================
# PLUGINS
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (must be at the very end)
run '~/.tmux/plugins/tpm/tpm'
